<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENTAS - Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --navbar-bg: #3c8dbc;
            --text-light: #b8c7ce;
            --sidebar-width: 250px;
        }
        body {
            background-color: #ecf0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        
        /* Layout Estructura */
        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        /* Sidebar Responsive */
        .sidebar {
            min-width: var(--sidebar-width);
            max-width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: #fff;
            transition: all 0.3s;
            min-height: 100vh;
            z-index: 1000;
        }

        .sidebar.active {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .sidebar .brand {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #367fa9;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .sidebar .nav-item {
            padding: 15px 20px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar .nav-item:hover, .sidebar .nav-item.active {
            background-color: var(--sidebar-hover);
            color: #fff;
            border-left: 3px solid var(--navbar-bg);
        }

        /* Main Content area */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-navbar {
            height: 60px;
            background-color: var(--navbar-bg);
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            justify-content: space-between;
        }

        .content-header { padding: 20px; }
        .content-body { padding: 0 20px 20px 20px; }

        .box {
            background: #fff;
            border-top: 3px solid #d2d6de;
            border-radius: 3px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            padding: 15px;
            margin-bottom: 20px;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Media Queries para Móviles */
        @media (max-width: 768px) {
            .sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
                position: fixed;
            }
            .sidebar.active {
                margin-left: 0;
            }
            .main-content {
                width: 100%;
            }
            .content-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <a href="#" class="brand">VENTAS</a>
        <div class="nav-item active" onclick="switchView('inicio', this)">
            <i class="fa fa-home"></i> Inicio
        </div>
        <div class="nav-item" onclick="switchView('usuarios', this)">
            <i class="fa fa-user"></i> Usuarios
        </div>
        <div class="nav-item" onclick="switchView('productos', this)">
            <i class="fab fa-product-hunt"></i> Productos
        </div>
        <div class="nav-item" onclick="switchView('ventas', this)">
            <i class="fa fa-shopping-cart"></i> Crear Venta
        </div>
    </aside>

    <div class="main-content">
        <header class="top-navbar">
            <button class="btn text-white" id="sidebarCollapse">
                <i class="fa fa-bars"></i>
            </button>
            <div>
                <span><i class="fa fa-user-circle"></i> Administrador</span>
            </div>
        </header>

        <section id="view-inicio" class="view-section active">
            <div class="content-header">
                <h2>Tablero Principal</h2>
            </div>
            <div class="content-body">
                <div class="box">
                    <p>Bienvenido al sistema de ventas optimizado para móviles.</p>
                </div>
            </div>
        </section>

        <section id="view-productos" class="view-section">
            <div class="content-header d-md-flex justify-content-between">
                <h2>Administrar productos</h2>
                <button class="btn btn-primary mt-2 mt-md-0" data-bs-toggle="modal" data-bs-target="#modalAgregarProducto">
                    <i class="fa fa-plus"></i> Agregar Producto
                </button>
            </div>
            <div class="content-body">
                <div class="box">
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Código</th>
                                    <th>Descripción</th>
                                    <th>Stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        
        <section id="view-ventas" class="view-section">
            <div class="content-header">
                <h2>Crear Venta</h2>
            </div>
            <div class="content-body">
                <div class="row">
                    <div class="col-12 col-lg-5 mb-3">
                        <div class="box border-success text-dark">
                            <h5>Datos de Venta</h5>
                            <hr>
                            <div class="mb-3 input-group">
                                <span class="input-group-text"><i class="fa fa-user"></i></span>
                                <input type="text" class="form-control" value="Vendedor Admin" readonly>
                            </div>
                            <button class="btn btn-success w-100">Guardar Venta</button>
                        </div>
                    </div>
                    <div class="col-12 col-lg-7">
                        <div class="box">
                            <h5>Seleccionar Productos</h5>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead><tr><th>Prod</th><th>Acción</th></tr></thead>
                                    <tbody id="listaVentaStock">
                                        <tr><td>Producto A</td><td><button class="btn btn-sm btn-primary">Add</button></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div class="modal fade" id="modalAgregarProducto" tabindex="-1">
    <div class="modal-dialog modal-fullscreen-sm-down"> <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formAgregarProducto">
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" required id="nuevaDescripcion">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Lógica para colapsar sidebar
    document.getElementById('sidebarCollapse').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('active');
    });

    // Cambiar vistas
    function switchView(viewId, element) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        // Cerrar menú en móviles tras elegir opción
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('active');
        }
    }
</script>

</body>
</html>
